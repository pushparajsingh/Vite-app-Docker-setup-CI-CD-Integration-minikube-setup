version: '3.8'

services:
  # Define the development react application service
  react-app:
    # Build configuration for the container
    build:
      context: . # Use the current directory as the build context
      dockerfile: Dockerfile.dev # Dev wali file use karega
    
    # Map port 3000 on the host to port 3000 inside the container
    ports:
      - "3000:3000" # Bahar ka 3000 -> Container ka 3000
    
    # Volumes config for hot-reloading and isolated node_modules
    volumes:
      # Bind Mount: Host machine ke files ko container ke /app folder se real-time sync (map) karta hai. Isse code changes save karte hi bina rebuild kiye hot-reload reflect ho jaenge.
      - .:/app 
      # Anonymous Volume: Local 'node_modules' ko container ke andar aane se block karta hai. Docker container apni isolated aur OS-specific node_modules banayega, jisse module conflicts nahi honge.
      - /app/node_modules
    
    # Environment variables for the container
    environment:
      - CHOKIDAR_USEPOLLING=true # Windows/Linux hot-reload fix ke liye